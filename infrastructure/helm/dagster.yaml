# Dagster instance config for production on EKS.
# Postgres connection and the run-pod image are env-indirected — no
# secret value or image tag is hardcoded here. The referenced env vars
# (DAGSTER_PG_HOST/USERNAME/PASSWORD/DB, DAGSTER_CURRENT_IMAGE) must be
# injected into the webserver/daemon/run pods by the deploy pipeline
# (out of scope for this file — see docs/superpowers/specs/2026-07-02-dagster-instance-config-design.md §3).

run_storage:
  module: dagster_postgres.run_storage
  class: PostgresRunStorage
  config: &pg_conn
    postgres_db:
      hostname:
        env: DAGSTER_PG_HOST
      username:
        env: DAGSTER_PG_USERNAME
      password:
        env: DAGSTER_PG_PASSWORD
      db_name:
        env: DAGSTER_PG_DB
      port: 5432

event_log_storage:
  module: dagster_postgres.event_log
  class: PostgresEventLogStorage
  config: *pg_conn

schedule_storage:
  module: dagster_postgres.schedule_storage
  class: PostgresScheduleStorage
  config: *pg_conn

run_launcher:
  module: dagster_k8s
  class: K8sRunLauncher
  config:
    service_account_name: dagster-sa
    job_namespace: dagster
    load_incluster_config: true
    image_pull_policy: Always
    job_image:
      env: DAGSTER_CURRENT_IMAGE
    env_vars:
      - AWS_REGION=ap-southeast-1
    # Name of the k8s ConfigMap holding this same dagster.yaml, mounted
    # into every run pod so it shares the daemon's instance config.
    # Required by K8sRunLauncher; the ConfigMap itself is created by the
    # deploy pipeline, out of scope for this file.
    instance_config_map: dagster-instance-config-map
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "1Gi"
    # node_selector/tolerations are not top-level K8sRunLauncher fields —
    # raw pod spec overrides go through run_k8s_config.pod_spec_config.
    run_k8s_config:
      pod_spec_config:
        node_selector:
          node-group: worker
        tolerations:
          - key: "spotWorker"
            operator: "Equal"
            value: "true"
            effect: "NoSchedule"

run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator
  config:
    max_concurrent_runs: 3

compute_logs:
  module: dagster_aws.s3.compute_log_manager
  class: S3ComputeLogManager
  config:
    bucket: finops-data-lake-processed
    prefix: dagster-compute-logs
    region: ap-southeast-1

telemetry:
  enabled: false
