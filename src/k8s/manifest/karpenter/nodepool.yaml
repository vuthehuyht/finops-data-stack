apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023
  # Must match aws_iam_role.karpenter_node.name in
  # infrastructure/terraform/modules/eks/main.tf ("${var.project_name}-karpenter-node-role"
  # with project_name = "finops"). Karpenter creates/manages the instance
  # profile from this role name automatically.
  role: finops-karpenter-node-role
  # Must match the karpenter.sh/discovery tag value
  # (aws_eks_cluster.main.name) set by aws_ec2_tag.karpenter_subnet_discovery
  # / karpenter_sg_discovery in infrastructure/terraform/modules/eks/main.tf.
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: finops-eks-cluster
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: finops-eks-cluster
  amiSelectorTerms:
    - alias: al2023@latest
  tags:
    node-group: worker
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      # Matches infrastructure/helm/values.yaml's
      # runLauncher.config.k8sRunLauncher.runK8sConfig.podSpecConfig.nodeSelector
      # so run pods keep scheduling onto these nodes unchanged.
      labels:
        node-group: worker
    spec:
      # Matches infrastructure/helm/values.yaml's matching toleration --
      # keeps system pods off these Spot nodes.
      taints:
        - key: spotWorker
          value: "true"
          effect: NoSchedule
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: ["t3", "t3a"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
  limits:
    cpu: "8"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
