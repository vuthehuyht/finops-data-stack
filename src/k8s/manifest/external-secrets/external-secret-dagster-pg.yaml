apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dagster-pg-credentials
  namespace: dagster
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: dagster-pg-credentials
    creationPolicy: Owner
  data:
    # Key "postgresql-password" is required exactly under this name -- the
    # Dagster Helm chart's templates/secret-postgres.yaml reads it via
    # global.postgresqlSecretName (see docs/superpowers/specs/
    # 2026-07-02-dagster-instance-config-design.md).
    - secretKey: postgresql-password
      remoteRef:
        key: finops-db-credentials
        property: rds_password
    # The other 9 keys keep their original names -- reserved for future
    # consumers (e.g. an ingestion pod reading ssi_token/investing_token
    # via env instead of boto3).
    - secretKey: rds_host
      remoteRef: { key: finops-db-credentials, property: rds_host }
    - secretKey: rds_username
      remoteRef: { key: finops-db-credentials, property: rds_username }
    - secretKey: rds_dbname
      remoteRef: { key: finops-db-credentials, property: rds_dbname }
    - secretKey: redshift_host
      remoteRef: { key: finops-db-credentials, property: redshift_host }
    - secretKey: redshift_username
      remoteRef: { key: finops-db-credentials, property: redshift_username }
    - secretKey: redshift_password
      remoteRef: { key: finops-db-credentials, property: redshift_password }
    - secretKey: redshift_dbname
      remoteRef: { key: finops-db-credentials, property: redshift_dbname }
    - secretKey: ssi_token
      remoteRef: { key: finops-db-credentials, property: ssi_token }
    - secretKey: investing_token
      remoteRef: { key: finops-db-credentials, property: investing_token }
