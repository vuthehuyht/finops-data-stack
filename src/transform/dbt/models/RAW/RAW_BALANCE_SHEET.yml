        description: Raw data source for RAW_BALANCE_SHEET
        meta:
          dagster:
            asset_key:
              - RAW
              - RAW_BALANCE_SHEET
        columns:
          - name: TICKER
            data_type: VARCHAR(256)
          - name: PERIOD
            data_type: VARCHAR(256)
          - name: YEAR
            data_type: VARCHAR(256)
          - name: TOTAL_ASSETS
            data_type: VARCHAR(256)
          - name: CURRENT_ASSETS
            data_type: VARCHAR(256)
          - name: CASH
            data_type: VARCHAR(256)
          - name: INVENTORY
            data_type: VARCHAR(256)
          - name: TOTAL_LIABILITIES
            data_type: VARCHAR(256)
          - name: SHORT_TERM_DEBT
            data_type: VARCHAR(256)
          - name: LONG_TERM_DEBT
            data_type: VARCHAR(256)
          - name: EQUITY
            data_type: VARCHAR(256)
          - name: BATCH_DATE
            data_type: DATE
          - name: _CONATA_SOURCE
            data_type: VARCHAR(256)
          - name: _CONATA_SOURCE_ROW_NUMBER
            data_type: INTEGER
          - name: _CONATA_PARTITION_KEY
            data_type: VARCHAR(256)
          - name: _CONATA_LOADED_AT
            data_type: TIMESTAMP
