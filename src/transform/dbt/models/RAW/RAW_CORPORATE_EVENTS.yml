    description: Raw data source for RAW
    schema: "{{ env_var('REDSHIFT_SCHEMA_RAW', 'raw') }}"
    tables:
      - name: RAW_CORPORATE_EVENTS
        description: Raw data source for RAW_CORPORATE_EVENTS
        config:
          meta:
            dagster:
              asset_key:
                - RAW
                - RAW_CORPORATE_EVENTS
