version: 2
sources:
  - name: RAW
    description: Raw data source for RAW
    schema: "{{ env_var('REDSHIFT_SCHEMA_RAW', 'raw') }}"
    tables:
      - name: RAW_EXCHANGE_RATES
        description: Raw data source for RAW_EXCHANGE_RATES
        meta:
          dagster:
            asset_key:
              - RAW
              - RAW_EXCHANGE_RATES
        columns:
          - name: PAIR
            data_type: VARCHAR(256)
          - name: DATE
            data_type: VARCHAR(256)
          - name: EXCHANGE_RATE
            data_type: VARCHAR(256)
          - name: BATCH_DATE
            data_type: DATE
          - name: _CONATA_SOURCE
            data_type: VARCHAR(256)
          - name: _CONATA_SOURCE_ROW_NUMBER
            data_type: INTEGER
          - name: _CONATA_PARTITION_KEY
            data_type: VARCHAR(256)
          - name: _CONATA_LOADED_AT
            data_type: TIMESTAMP
