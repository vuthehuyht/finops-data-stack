version: 2
sources:
  - name: RAW
    description: Raw data source for RAW
    schema: "{{ env_var('REDSHIFT_SCHEMA_RAW', 'raw') }}"
    tables:
      - name: RAW_ANALYST_REPORTS
        description: Raw data source for RAW_ANALYST_REPORTS
        config:
          meta:
            dagster:
              asset_key:
                - RAW
                - RAW_ANALYST_REPORTS
        columns:
          - name: REPORT_ID
            data_type: VARCHAR(256)
          - name: TICKER
            data_type: VARCHAR(256)
          - name: BROKERAGE_FIRM
            data_type: VARCHAR(256)
          - name: PUBLISH_DATE
            data_type: VARCHAR(256)
          - name: TITLE
            data_type: VARCHAR(256)
          - name: DESCRIPTION
            data_type: VARCHAR(8000)
          - name: FILE_NAME
            data_type: VARCHAR(256)
          - name: BATCH_DATE
            data_type: DATE
          - name: _CONATA_SOURCE
            data_type: VARCHAR(256)
          - name: _CONATA_SOURCE_ROW_NUMBER
            data_type: INTEGER
          - name: _CONATA_PARTITION_KEY
            data_type: VARCHAR(256)
          - name: _CONATA_LOADED_AT
            data_type: TIMESTAMP
