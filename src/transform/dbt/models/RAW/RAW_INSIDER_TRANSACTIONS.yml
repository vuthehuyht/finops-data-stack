version: 2
sources:
  - name: RAW
    description: Raw data source for RAW
    schema: "{{ env_var('REDSHIFT_SCHEMA_RAW', 'raw') }}"
    tables:
      - name: RAW_INSIDER_TRANSACTIONS
        description: Raw data source for RAW_INSIDER_TRANSACTIONS
        config:
          meta:
            dagster:
              asset_key:
                - RAW
                - RAW_INSIDER_TRANSACTIONS
        columns:
          - name: TRANSACTION_ID
            data_type: VARCHAR(256)
          - name: TICKER
            data_type: VARCHAR(256)
          - name: INSIDER_NAME
            data_type: VARCHAR(256)
          - name: POSITION
            data_type: VARCHAR(256)
          - name: ACTION
            data_type: VARCHAR(256)
          - name: REGISTERED_VOL
            data_type: VARCHAR(256)
          - name: EXECUTED_VOL
            data_type: VARCHAR(256)
          - name: DATE_START
            data_type: VARCHAR(256)
          - name: DATE_END
            data_type: VARCHAR(256)
          - name: BATCH_DATE
            data_type: DATE
          - name: _CONATA_SOURCE
            data_type: VARCHAR(256)
          - name: _CONATA_SOURCE_ROW_NUMBER
            data_type: INTEGER
          - name: _CONATA_PARTITION_KEY
            data_type: VARCHAR(256)
          - name: _CONATA_LOADED_AT
            data_type: TIMESTAMP
