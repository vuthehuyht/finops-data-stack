models:
  - name: MART_INSIDER_PROPRIETARY_FLOWS
    description: >
      Insider transaction signals, proprietary desk flows, and foreign investor
      flows aggregated at Ticker + Date granularity.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - TICKER
            - TRADING_DATE
    meta:
      dagster:
        asset_key:
          - MART
          - MART_INSIDER_PROPRIETARY_FLOWS
    columns:
      - name: TICKER
        data_type: VARCHAR(256)
        data_tests:
          - not_null
      - name: TRADING_DATE
        data_type: DATE
        data_tests:
          - not_null
      - name: FOREIGN_BUY_RATIO_10D
        data_type: NUMERIC(18, 6)
        description: sum(buy_val_10d) / sum(total_trading_val_10d) for foreign investors
      - name: NET_FOREIGN_FLOW_1M
        data_type: NUMERIC(18, 4)
        description: Rolling 20-day sum of net foreign trading value
      - name: NET_FOREIGN_FLOW_MOMENTUM_1M
        data_type: NUMERIC(18, 6)
        description: Change in 20-day net foreign flow vs prior 20-day period
      - name: PROP_TRADING_NET_VAL_5D
        data_type: NUMERIC(18, 4)
        description: Rolling 5-day sum of proprietary desk net trading value
      - name: PROP_VS_FOREIGN_CORRELATION_10D
        data_type: NUMERIC(18, 6)
        description: 10-day rolling Pearson correlation between prop and foreign net values
      - name: INSIDER_SENTIMENT_SIGNAL
        data_type: SMALLINT
        description: "-1 (net sell), 0 (neutral), +1 (net buy) based on insider transactions on this day"
      - name: INSIDER_BUY_VOLUME_RATIO
        data_type: NUMERIC(18, 6)
        description: insider_buy_vol / insider_total_vol on announcement date
      - name: DATACORE_CREATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_CREATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_CREATE_BY
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_UPDATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_BY
        data_type: VARCHAR(256)
      - name: BATCH_DATE
        data_type: DATE
