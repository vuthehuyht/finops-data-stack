models:
  - name: STG_BALANCE_SHEET
    description: Cleaned/Staging model for raw_balance_sheet
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - TICKER
            - PERIOD
            - YEAR
    config:
      meta:
        dagster:
          asset_key:
            - STAGING
            - STG_BALANCE_SHEET
    columns:
      - name: TICKER
        data_type: VARCHAR(256)
        data_tests:
          - not_null
      - name: PERIOD
        data_type: VARCHAR(256)
        data_tests:
          - not_null
      - name: YEAR
        data_type: INTEGER
        data_tests:
          - not_null
      - name: TOTAL_ASSETS
        data_type: NUMERIC(18, 4)
      - name: CURRENT_ASSETS
        data_type: NUMERIC(18, 4)
      - name: CASH
        data_type: NUMERIC(18, 4)
      - name: INVENTORY
        data_type: NUMERIC(18, 4)
      - name: TOTAL_LIABILITIES
        data_type: NUMERIC(18, 4)
      - name: SHORT_TERM_DEBT
        data_type: NUMERIC(18, 4)
      - name: LONG_TERM_DEBT
        data_type: NUMERIC(18, 4)
      - name: EQUITY
        data_type: NUMERIC(18, 4)
      - name: BATCH_DATE
        data_type: DATE
      - name: DATACORE_CREATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_CREATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_CREATE_BY
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_UPDATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_BY
        data_type: VARCHAR(256)
