models:
  - name: STG_COMPANY_PROFILE
    description: Cleaned/Staging model for raw_company_profile
    config:
      meta:
        dagster:
          asset_key:
            - STAGING
            - STG_COMPANY_PROFILE
    columns:
      - name: TICKER
        data_type: VARCHAR(256)
        data_tests:
          - not_null
          - unique
      - name: COMPANY_NAME
        data_type: VARCHAR(512)
      - name: INDUSTRY
        data_type: VARCHAR(256)
      - name: EXCHANGE
        data_type: VARCHAR(256)
      - name: DESCRIPTION
        data_type: VARCHAR(65535)
      - name: BATCH_DATE
        data_type: DATE
      - name: DATACORE_CREATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_CREATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_CREATE_BY
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_UPDATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_BY
        data_type: VARCHAR(256)
      - name: OUTSTANDING_SHARE
