models:
  - name: STG_INCOME_STATEMENT
    description: Cleaned/Staging model for raw_income_statement
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - TICKER
            - PERIOD
            - YEAR
    config:
      meta:
        dagster:
          asset_key:
            - STAGING
            - STG_INCOME_STATEMENT
    columns:
      - name: TICKER
        data_type: VARCHAR(256)
        data_tests:
          - not_null
      - name: PERIOD
        data_type: VARCHAR(256)
        data_tests:
          - not_null
      - name: YEAR
        data_type: INTEGER
        data_tests:
          - not_null
      - name: REVENUE
        data_type: NUMERIC(18, 4)
      - name: COGS
        data_type: NUMERIC(18, 4)
      - name: GROSS_PROFIT
        data_type: NUMERIC(18, 4)
      - name: OPERATING_EXPENSES
        data_type: NUMERIC(18, 4)
      - name: OPERATING_PROFIT
        data_type: NUMERIC(18, 4)
      - name: FINANCIAL_INCOME
        data_type: NUMERIC(18, 4)
      - name: FINANCIAL_EXPENSES
        data_type: NUMERIC(18, 4)
      - name: NET_PROFIT_AFTER_TAX
        data_type: NUMERIC(18, 4)
      - name: BATCH_DATE
        data_type: DATE
      - name: DATACORE_CREATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_CREATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_CREATE_BY
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_UPDATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_BY
        data_type: VARCHAR(256)
