    meta:
      dagster:
        asset_key:
          - STAGING
          - STG_ANALYST_REPORTS
    columns:
      - name: REPORT_ID
        data_type: VARCHAR(256)
        data_tests:
          - not_null
          - unique
      - name: TICKER
        data_type: VARCHAR(256)
      - name: BROKERAGE_FIRM
        data_type: VARCHAR(256)
      - name: PUBLISH_DATE
        data_type: DATE
      - name: RECOMMENDATION
        data_type: VARCHAR(256)
      - name: TARGET_PRICE
        data_type: NUMERIC(18, 4)
      - name: REPORT_PDF_URL
        data_type: VARCHAR(256)
      - name: BATCH_DATE
        data_type: DATE
      - name: DATACORE_CREATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_CREATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_CREATE_BY
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_UPDATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_BY
        data_type: VARCHAR(256)
