models:
  - name: STG_ANALYST_REPORTS
    description: Cleaned/Staging model for raw_analyst_reports
    config:
      meta:
        dagster:
          asset_key:
            - STAGING
            - STG_ANALYST_REPORTS
    columns:
      - name: REPORT_ID
        data_type: VARCHAR(256)
        data_tests:
          - not_null
          - unique
      - name: TICKER
        data_type: VARCHAR(256)
      - name: BROKERAGE_FIRM
        data_type: VARCHAR(256)
      - name: PUBLISH_DATE
        data_type: DATE
      - name: TITLE
        data_type: VARCHAR(256)
      - name: DESCRIPTION
        data_type: VARCHAR(8000)
      - name: FILE_NAME
        data_type: VARCHAR(256)
      - name: BATCH_DATE
        data_type: DATE
      - name: DATACORE_CREATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_CREATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_CREATE_BY
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_UPDATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_BY
        data_type: VARCHAR(256)
