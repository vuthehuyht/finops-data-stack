models:
  - name: STG_FINANCIAL_RATIOS
    description: Cleaned/Staging model for raw_financial_ratios
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - TICKER
              - DATE
    config:
      meta:
        dagster:
          asset_key:
            - STAGING
            - STG_FINANCIAL_RATIOS
    columns:
      - name: TICKER
        data_type: VARCHAR(256)
        data_tests:
          - not_null
      - name: DATE
        data_type: DATE
        data_tests:
          - not_null
      - name: SHARES_OUTSTANDING
        data_type: NUMERIC(18, 4)
      - name: MARKET_CAP
        data_type: NUMERIC(18, 4)
      - name: BATCH_DATE
        data_type: DATE
      - name: DATACORE_CREATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_CREATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_CREATE_BY
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_UPDATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_BY
        data_type: VARCHAR(256)
