models:
  - name: STG_FOREIGN_TRADING
    description: Cleaned/Staging model for raw_foreign_trading
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - TICKER
              - TRADING_DATE
    config:
      meta:
        dagster:
          asset_key:
            - STAGING
            - STG_FOREIGN_TRADING
    columns:
      - name: TICKER
        data_type: VARCHAR(256)
        data_tests:
          - not_null
      - name: TRADING_DATE
        data_type: DATE
        data_tests:
          - not_null
      - name: BUY_VOL
        data_type: NUMERIC(18, 4)
      - name: SELL_VOL
        data_type: NUMERIC(18, 4)
      - name: BUY_VAL
        data_type: NUMERIC(18, 4)
      - name: SELL_VAL
        data_type: NUMERIC(18, 4)
      - name: NET_VAL
        data_type: NUMERIC(18, 4)
      - name: BATCH_DATE
        data_type: DATE
      - name: DATACORE_CREATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_CREATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_CREATE_BY
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_UPDATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_BY
        data_type: VARCHAR(256)
