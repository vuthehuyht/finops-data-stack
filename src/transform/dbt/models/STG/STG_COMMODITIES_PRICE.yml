models:
  - name: STG_COMMODITIES_PRICE
    description: Cleaned/Staging model for raw_commodities_price
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - COMMODITY_NAME
            - DATE
    meta:
      dagster:
        asset_key:
          - STAGING
          - STG_COMMODITIES_PRICE
    columns:
      - name: COMMODITY_NAME
        data_type: VARCHAR(256)
        data_tests:
          - not_null
      - name: DATE
        data_type: DATE
        data_tests:
          - not_null
      - name: PRICE
        data_type: NUMERIC(18, 4)
      - name: BATCH_DATE
        data_type: DATE
      - name: DATACORE_CREATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_CREATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_CREATE_BY
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_UPDATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_BY
        data_type: VARCHAR(256)
