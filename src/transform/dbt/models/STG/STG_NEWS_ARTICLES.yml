models:
  - name: STG_NEWS_ARTICLES
    description: Cleaned/Staging model for raw_news_articles
    config:
      meta:
        dagster:
          asset_key:
            - STAGING
            - STG_NEWS_ARTICLES
    columns:
      - name: ARTICLE_ID
        data_type: VARCHAR(256)
        data_tests:
          - not_null
          - unique
      - name: TICKER
        data_type: VARCHAR(256)
      - name: PUBLISH_TIME
        data_type: TIMESTAMP
      - name: TITLE
        data_type: VARCHAR(256)
      - name: SUMMARY
        data_type: VARCHAR(256)
      - name: CONTENT
        data_type: VARCHAR(256)
      - name: SOURCE
        data_type: VARCHAR(256)
      - name: URL
        data_type: VARCHAR(256)
      - name: BATCH_DATE
        data_type: DATE
      - name: DATACORE_CREATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_CREATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_CREATE_BY
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_UPDATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_BY
        data_type: VARCHAR(256)
