models:
  - name: STG_INDEX_PRICE_EOD
    description: Cleaned/Staging model for raw_index_price_eod
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - INDEX_NAME
            - TRADING_DATE
    meta:
      dagster:
        asset_key:
          - STAGING
          - STG_INDEX_PRICE_EOD
    columns:
      - name: INDEX_NAME
        data_type: VARCHAR(256)
        data_tests:
          - not_null
      - name: TRADING_DATE
        data_type: DATE
        data_tests:
          - not_null
      - name: OPEN
        data_type: NUMERIC(18, 4)
      - name: HIGH
        data_type: NUMERIC(18, 4)
      - name: LOW
        data_type: NUMERIC(18, 4)
      - name: CLOSE
        data_type: NUMERIC(18, 4)
      - name: VOLUME
        data_type: NUMERIC(18, 4)
      - name: BATCH_DATE
        data_type: DATE
      - name: DATACORE_CREATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_CREATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_CREATE_BY
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_UPDATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_BY
        data_type: VARCHAR(256)
