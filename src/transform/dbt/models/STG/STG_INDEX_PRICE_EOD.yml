models:
  - name: STG_INDEX_PRICE_EOD
    description: Cleaned/Staging model for raw_index_price_eod
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - INDEX_NAME
            - TRADING_DATE
    meta:
      dagster:
        asset_key:
          - DWH
          - BATCH
          - STG_INDEX_PRICE_EOD
    columns:
      - name: INDEX_NAME
        data_type: VARCHAR(256)
        data_tests:
          - not_null
      - name: TRADING_DATE
        data_type: DATE
        data_tests:
          - not_null
      - name: OPEN
        data_type: NUMERIC(18, 4)
      - name: HIGH
        data_type: NUMERIC(18, 4)
      - name: LOW
        data_type: NUMERIC(18, 4)
      - name: CLOSE
        data_type: NUMERIC(18, 4)
      - name: VOLUME
        data_type: NUMERIC(18, 4)
      - name: BATCH_DATE
        data_type: DATE
      - name: _CONATA_SOURCE
        data_type: VARCHAR(256)
      - name: _CONATA_SOURCE_ROW_NUMBER
        data_type: INTEGER
      - name: _CONATA_PARTITION_KEY
        data_type: VARCHAR(256)
      - name: _CONATA_LOADED_AT
        data_type: TIMESTAMP
