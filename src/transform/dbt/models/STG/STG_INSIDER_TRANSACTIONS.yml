models:
  - name: STG_INSIDER_TRANSACTIONS
    description: Cleaned/Staging model for raw_insider_transactions
    config:
      meta:
        dagster:
          asset_key:
            - STAGING
            - STG_INSIDER_TRANSACTIONS
    columns:
      - name: TRANSACTION_ID
        data_type: VARCHAR(256)
        data_tests:
          - not_null
          - unique
      - name: TICKER
        data_type: VARCHAR(256)
      - name: INSIDER_NAME
        data_type: VARCHAR(256)
      - name: POSITION
        data_type: VARCHAR(256)
      - name: ACTION
        data_type: VARCHAR(256)
      - name: REGISTERED_VOL
        data_type: NUMERIC(18, 4)
      - name: EXECUTED_VOL
        data_type: NUMERIC(18, 4)
      - name: DATE_START
        data_type: DATE
      - name: DATE_END
        data_type: DATE
      - name: BATCH_DATE
        data_type: DATE
      - name: DATACORE_CREATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_CREATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_CREATE_BY
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_DATETIME
        data_type: TIMESTAMP
      - name: DATACORE_UPDATE_PROGRAM
        data_type: VARCHAR(256)
      - name: DATACORE_UPDATE_BY
        data_type: VARCHAR(256)
