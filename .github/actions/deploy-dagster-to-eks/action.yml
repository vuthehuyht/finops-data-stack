name: "Deploy Dagster to EKS"
description: "Idempotent bootstrap + deploy: namespaces, ServiceAccounts, External Secrets Operator, ExternalSecret, Dagster Helm chart."

inputs:
  aws-role-arn:
    description: "IAM role ARN to assume via OIDC (module.eks.github_actions_deploy_role_arn)"
    required: true
  aws-region:
    description: "AWS region"
    required: false
    default: "ap-southeast-1"
  eks-cluster-name:
    description: "EKS cluster name (terraform output eks_cluster_name)"
    required: true
  ecr-repository-url:
    description: "ECR repository URL for the Dagster user-code image (terraform output ecr_repository_url)"
    required: true
  rds-address:
    description: "RDS instance address for Dagster metadata storage (terraform output rds_address)"
    required: true
  rds-username:
    description: "RDS instance username (terraform output rds_username)"
    required: true
  rds-dbname:
    description: "RDS instance database name (terraform output rds_dbname)"
    required: true
  dagster-sa-role-arn:
    description: "IAM role ARN for the dagster-sa IRSA ServiceAccount (terraform output dagster_sa_role_arn)"
    required: true
  external-secrets-sa-role-arn:
    description: "IAM role ARN for the external-secrets-sa IRSA ServiceAccount (terraform output external_secrets_sa_role_arn)"
    required: true
  karpenter-controller-role-arn:
    description: "IAM role ARN for the karpenter IRSA ServiceAccount (terraform output karpenter_controller_role_arn)"
    required: true
  karpenter-interruption-queue-name:
    description: "SQS queue name Karpenter uses for Spot interruption notifications (terraform output karpenter_interruption_queue_name)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - name: Install kubectl
      uses: azure/setup-kubectl@v4

    - name: Install Helm
      uses: azure/setup-helm@v4

    - name: Update kubeconfig for the EKS cluster
      shell: bash
      run: aws eks update-kubeconfig --name ${{ inputs.eks-cluster-name }} --region ${{ inputs.aws-region }}

    - name: Create namespaces (idempotent)
      shell: bash
      run: |
        kubectl create namespace dagster --dry-run=client -o yaml | kubectl apply -f -
        kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -

    - name: Create/update IRSA ServiceAccounts (idempotent)
      shell: bash
      run: |
        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: dagster-sa
          namespace: dagster
          annotations:
            eks.amazonaws.com/role-arn: ${{ inputs.dagster-sa-role-arn }}
        EOF
        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: external-secrets-sa
          namespace: external-secrets
          annotations:
            eks.amazonaws.com/role-arn: ${{ inputs.external-secrets-sa-role-arn }}
        EOF
        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: karpenter
          namespace: kube-system
          annotations:
            eks.amazonaws.com/role-arn: ${{ inputs.karpenter-controller-role-arn }}
        EOF

    - name: Install/upgrade Karpenter
      shell: bash
      run: |
        helm upgrade --install karpenter oci://public.ecr.aws/karpenter/karpenter \
          -n kube-system \
          --version "1.11.3" \
          --set settings.clusterName=${{ inputs.eks-cluster-name }} \
          --set settings.interruptionQueue=${{ inputs.karpenter-interruption-queue-name }} \
          --set serviceAccount.create=false \
          --set serviceAccount.name=karpenter \
          --wait

    - name: Apply Karpenter NodePool and EC2NodeClass manifests
      shell: bash
      run: kubectl apply -f src/k8s/manifest/karpenter/

    - name: Install/upgrade External Secrets Operator
      shell: bash
      run: |
        helm repo add external-secrets https://charts.external-secrets.io
        helm repo update external-secrets
        helm upgrade --install external-secrets external-secrets/external-secrets \
          -n external-secrets \
          --set installCRDs=true \
          --wait

    - name: Apply ClusterSecretStore and ExternalSecret manifests
      shell: bash
      run: kubectl apply -f src/k8s/manifest/external-secrets/

    - name: Wait for dagster-pg-credentials Secret to be synced by ESO
      shell: bash
      run: |
        for i in $(seq 1 30); do
          if kubectl get secret dagster-pg-credentials -n dagster >/dev/null 2>&1; then
            echo "dagster-pg-credentials Secret exists"
            exit 0
          fi
          echo "Waiting for ExternalSecret to sync dagster-pg-credentials ($i/30)..."
          sleep 5
        done
        echo "Timed out waiting for dagster-pg-credentials Secret"
        exit 1

    - name: Install/upgrade Dagster Helm chart
      shell: bash
      run: |
        helm repo add dagster https://dagster-io.github.io/helm
        helm repo update dagster
        helm upgrade --install dagster dagster/dagster \
          -n dagster \
          -f infrastructure/helm/values.yaml \
          --set dagster-user-deployments.deployments[0].image.repository=${{ inputs.ecr-repository-url }} \
          --set postgresql.postgresqlHost=${{ inputs.rds-address }} \
          --set postgresql.postgresqlUsername=${{ inputs.rds-username }} \
          --set postgresql.postgresqlDatabase=${{ inputs.rds-dbname }} \
          --wait
