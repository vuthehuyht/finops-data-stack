name: Check Docker

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - 'src/dagster/**'
      - 'src/pipeline/dagster/**'
      - 'src/common/**'
      - 'src/docker/**'
      - 'pyproject.toml'
      - 'uv.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Reviewdog for hadolint reports
      - name: Lint Dockerfile (hadolint) with Reviewdog
        uses: reviewdog/action-hadolint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: diff_context
          hadolint_flags: '--failure-threshold error'
          hadolint_ignore: 'DL3008' # Optional: Ignore package version pins warning if preferred

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Generate image tag
        if: github.event_name == 'push'
        run: echo "IMAGE_TAG=$(date -u +%Y%m%d-%H%M)" >> "$GITHUB_ENV"

      - name: Configure AWS credentials via OIDC
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Log in to Amazon ECR
        if: github.event_name == 'push'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/docker/Dockerfile
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: ${{ github.event_name == 'push' && format('{0}/finops-dagster-app:{1}', steps.ecr-login.outputs.registry, env.IMAGE_TAG) || 'finops-data-stack:ci' }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Temporary workaround for cache clean up
      # https://github.com/docker/build-push-action/issues/252
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Verify that the Dagster workspace can be loaded
        if: github.event_name != 'push'
        run: |
          docker run --rm finops-data-stack:ci \
            python -c "from src.dagster.workspace import defs; print(f'Loaded {len(list(defs.assets_defs_by_key))} assets')"

      - name: Verify that the Dagster gRPC server can start
        if: github.event_name != 'push'
        run: |
          docker run -d --name dagster-grpc-test -p 3030:3030 finops-data-stack:ci
          for _ in $(seq 1 30); do
            if docker exec dagster-grpc-test dagster api grpc-health-check -p 3030 2>/dev/null; then
              echo "gRPC server is healthy"
              docker stop dagster-grpc-test
              docker rm dagster-grpc-test
              exit 0
            fi
            sleep 2
          done
          echo "gRPC server failed to start within 60s. Logs:"
          docker logs dagster-grpc-test
          docker rm -f dagster-grpc-test
          exit 1

      - name: Bump image tag in Helm values
        if: github.event_name == 'push'
        run: |
          sed -i "s|tag: ~ # filled by CI/CD with the built image tag|tag: \"${IMAGE_TAG}\" # filled by CI/CD with the built image tag|" infrastructure/helm/values.yaml

      - name: Open or update the deploy PR
        if: github.event_name == 'push'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: deploy/bump-dagster-image-tag
          title: "deploy: bump Dagster image tag to ${{ env.IMAGE_TAG }}"
          commit-message: "deploy: bump Dagster image tag to ${{ env.IMAGE_TAG }}"
          body: |
            Auto-generated by the `Check Docker` workflow after a push to `main`
            touching Dagster code. Built and pushed `${{ env.IMAGE_TAG }}` to ECR.
            Merging this PR triggers `deploy.yml`'s `deploy-app` job.
          add-paths: infrastructure/helm/values.yaml
