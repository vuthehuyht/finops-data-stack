name: Check dbt & DDL

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  check-dbt-paths:
    runs-on: ubuntu-latest
    outputs:
      dbt_related: ${{ steps.filter.outputs.targets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check for changes under dbt or redshift paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            targets:
              - .github/workflows/dbt.yml
              - src/redshift/**
              - src/transform/dbt/**
              - uv.lock
              - pyproject.toml

  check-dbt:
    needs: check-dbt-paths
    if: github.event_name != 'pull_request' || needs.check-dbt-paths.outputs.dbt_related == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgres:15-alpine
        ports:
          - 5439:5432
        env:
          POSTGRES_DB: dev
          POSTGRES_USER: awsuser
          POSTGRES_PASSWORD: mock_password

    env:
      # Redshift simulator config using Postgres
      REDSHIFT_HOST: localhost
      REDSHIFT_PORT: 5439
      REDSHIFT_DATABASE: dev
      REDSHIFT_USER: awsuser
      REDSHIFT_PASSWORD: mock_password
      DBT_TYPE: postgres

      # Dynamic schema prefixes to prevent parallel runs collision
      REDSHIFT_SCHEMA_RAW: CI_RAW_${{ github.run_number }}
      REDSHIFT_STAGING_SCHEMA: CI_STG_${{ github.run_number }}
      REDSHIFT_MART_SCHEMA: CI_MART_${{ github.run_number }}
      REDSHIFT_SCHEMA_LOGS: CI_LOGS_${{ github.run_number }}
      REDSHIFT_SCHEMA_FUNCTION: CI_DB_UTILS_${{ github.run_number }}
      REDSHIFT_SCHEMA_OPERATION: CI_OPERATION_${{ github.run_number }}

      # dbt variables used in all build/test steps
      # yamllint disable-line rule:line-length
      VARS: '{"partition_key": "2024-01-01", "batch_date": "2024-01-01", "dagster_job_name": "CI_DBT_JOB"}'
      # yamllint disable-line rule:line-length
      DBT_WARN_ERROR_OPTIONS: '{"error": "all", "warn": ["NoNodesForSelectionCriteria", "NoNodesSelected", "NothingToDo", "UnversionedBreakingChange"]}'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv & Sync Dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv sync --frozen

      # Setup Reviewdog binary
      - name: Setup Reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: 'v0.20.1'

      - name: Run Redshift DDL Setup
        run: bash ./src/redshift/dev/setup.sh --skip_confirmation

      - name: Install dbt packages
        working-directory: src/transform/dbt
        run: |
          rm -f package-lock.yml
          uv run dbt deps --profiles-dir .

      - name: Verify that all models in the dbt project are buildable
        working-directory: src/transform/dbt
        id: dbt_build
        run: |
          uv run dbt build --profiles-dir . --vars "${VARS}" \
            --full-refresh --exclude-resource-type unit_test | tee dbt_build_output.log

      - name: Check compiled query on failure
        if: failure() && steps.dbt_build.outcome == 'failure'
        working-directory: src/transform/dbt
        run: |
          if [ -f "dbt_build_output.log" ]; then
            output=$(cat dbt_build_output.log)
            if [[ "${output}" == *'compiled code at'* ]]; then
              path=$(echo "${output}" | sed -n "s/.*compiled code at //p")
              echo "Compiled query is available at ${path}"
              cat "${path}" || echo "Failed to read compiled query file"
            else
              echo "No compiled query found."
            fi
          else
            echo "No dbt log found."
          fi

      - name: Verify that unit tests succeed
        working-directory: src/transform/dbt
        run: |
          uv run dbt test --profiles-dir . --vars "${VARS}" \
            --select 'test_type:unit'

      - name: Verify that all incremental models in the dbt project are buildable
        working-directory: src/transform/dbt
        id: dbt_incremental_build
        run: |
          uv run dbt build --profiles-dir . --vars "${VARS}" \
            --select 'config.materialized:incremental' | tee dbt_incremental_output.log

      - name: Check compiled query on failure (incremental)
        if: failure() && steps.dbt_incremental_build.outcome == 'failure'
        working-directory: src/transform/dbt
        run: |
          if [ -f "dbt_incremental_output.log" ]; then
            output=$(cat dbt_incremental_output.log)
            if [[ "${output}" == *'compiled code at'* ]]; then
              path=$(echo "${output}" | sed -n "s/.*compiled code at //p")
              echo "Compiled query is available at ${path}"
              cat "${path}" || echo "Failed to read compiled query file"
            else
              echo "No compiled query found."
            fi
          else
            echo "No dbt log found."
          fi

      - name: SQLFluff Lint with Reviewdog (Modified SQL Only)
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main:main
          CHANGED_SQL=$(git diff --name-only --diff-filter=AM main HEAD -- 'src/transform/dbt/**/*.sql' | sed 's|src/transform/dbt/||' | tr '\n' ' ')
          if [ -n "$CHANGED_SQL" ]; then
            echo "Linting modified SQL files: $CHANGED_SQL"
            cd src/transform/dbt
            # shellcheck disable=SC2086
            uv run sqlfluff lint --format=parsable $CHANGED_SQL | \
              reviewdog \
                -tee \
                -efm='%f:%l:%c: %m' \
                -reporter=github-pr-review \
                -filter-mode=diff_context \
                -name='sqlfluff' \
                -fail-on-error
          else
            echo "No SQL files changed."
          fi

      - name: Run Redshift DDL Teardown
        if: always()
        run: bash ./src/redshift/dev/teardown.sh --skip_confirmation
